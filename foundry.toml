[profile.default]
src = "contracts"
out = "out"
libs = ["lib", "node_modules"]
test = "test"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
fs_permissions = [{ access = "read-write", path = "./" }]

remappings = [
  "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/",
  "forge-std/=lib/forge-std/src/"
]
